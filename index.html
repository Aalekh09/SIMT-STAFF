<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAHA Institute - Staff Performance System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login-container">

    <div class="login-card">

      <div class="institute-logo">
        <div class="logo-circle">SIMT</div>
      </div>

      <h1 class="institute-name">SAHA INSTITUTE OF<br>MANAGEMENT & TECHNOLOGY</h1>
      
      <div class="login-divider"></div>

      <h2>Staff Performance System</h2>

      <input type="email" id="email" placeholder="Enter your email" onkeypress="if(event.key==='Enter') login()">

      <button onclick="login()" id="loginBtn">Login</button>

      <div class="login-footer">
        <small>© 2026 SAHA Institute. All rights reserved.</small>
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
